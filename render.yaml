# render.yaml
services:
  - type: web
    name: emotion-analysis-system
    runtime: image
    repo: https://github.com/ВАШ_РЕПОЗИТОРИЙ
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emotion-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: emotion-db
    plan: free