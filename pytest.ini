[pytest]
# Настройки pytest для проекта Emotion Analysis System
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Добавляем корневую директорию в PYTHONPATH
pythonpath = .

# Подробный вывод + показывать локальные переменные при ошибке
addopts =
    -v
    --tb=short
    -p no:warnings
    --strict-markers

# Отображение stdout (для ML-отчётов)
log_cli = false
log_level = WARNING

markers =
    unit: Модульные тесты (без внешних зависимостей)
    integration: Интеграционные тесты (FastAPI + мок-БД)
    functional: Функциональные API-тесты
    ml: Тесты валидации ML-модели
    slow: Медленные тесты (загрузка модели и т.д.)